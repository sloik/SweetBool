name: Merge or commit

env:
  DEVELOPER_DIR: /Applications/Xcode_14.3.app/Contents/Developer

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: macos-13

    steps:
    - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
